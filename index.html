<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dexdior447 — Live Stream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://embed.twitch.tv/embed/v1.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #9146FF;
      --dark:   #0e0e10;
      --card:   #18181b;
      --border: #2a2a2e;
      --text:   #efeff1;
      --muted:  #adadb8;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .twitch-logo {
      width: 32px; height: 32px;
      background: var(--purple);
      border-radius: 8px;
      display: grid; place-items: center;
    }

    .twitch-logo svg { width: 20px; height: 20px; fill: white; }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: var(--text);
    }

    header h1 span { color: var(--purple); }

    .live-badge {
      margin-left: auto;
      background: #e91916;
      color: white;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .live-badge.visible { opacity: 1; }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: white;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      gap: 0;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 24px 24px;
      gap: 20px;
    }

    /* ── PLAYER ── */
    .player-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #twitch-embed {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      border: 1px solid var(--border);
      position: relative;
    }

    #twitch-embed iframe {
      width: 100% !important;
      height: 100% !important;
      border: none;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-radius: 12px;
      transition: opacity 0.5s;
      z-index: 10;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── INFO BAR ── */
    .stream-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), #bf94ff);
      display: grid; place-items: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: white;
      flex-shrink: 0;
    }

    .stream-meta { flex: 1; }
    .stream-meta .channel-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
    }

    .stream-meta .channel-name a {
      color: var(--purple);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .stream-meta .channel-name a:hover { opacity: 0.8; }

    .stream-meta .sub-info {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .watch-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--purple);
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .watch-btn:hover { background: #7c3aed; transform: translateY(-1px); }

    /* ── CHAT PANEL ── */
    .chat-section {
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--muted);
      padding-left: 4px;
    }

    #twitch-chat {
      flex: 1;
      min-height: 500px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
    }

    #twitch-chat iframe {
      width: 100% !important;
      height: 100% !important;
      border: none;
    }

    /* ── STATUS BOX ── */
    .status-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.84rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.4s;
    }

    .status-indicator.online  { background: #00c896; }
    .status-indicator.offline { background: #e91916; }

    #status-text { transition: color 0.3s; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--purple); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 16px;
      }

      .chat-section {
        grid-row: auto;
      }

      #twitch-chat { min-height: 400px; }
    }

    @media (max-width: 500px) {
      header { padding: 14px 16px; }
      header h1 { font-size: 1.2rem; }
      .watch-btn { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="twitch-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.149 0L.537 4.119v16.836h5.731V24l4.119-3.045h3.284L21.463 12V0H2.149zm17.612 11.104l-3.283 3.045h-3.284l-2.88 2.88v-2.88H6.268V1.79h13.493v9.314zM17.28 4.597h-1.79v5.373h1.79V4.597zm-4.716 0h-1.79v5.373h1.79V4.597z"/>
      </svg>
    </div>
    <h1>WATCH <span>dexdior447</span></h1>
    <div class="live-badge" id="live-badge">
      <span class="live-dot"></span>
      LIVE
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- VIDEO PLAYER -->
    <div class="player-section">
      <div id="twitch-embed" style="position:relative;">
        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
          <p>Loading stream…</p>
        </div>
      </div>

      <!-- STREAM INFO -->
      <div class="stream-info">
        <div class="avatar">D</div>
        <div class="stream-meta">
          <div class="channel-name">
            <a href="https://www.twitch.tv/dexdior447" target="_blank">dexdior447</a>
          </div>
          <div class="sub-info">Twitch • Live Stream Embed Demo</div>
        </div>
        <a href="https://www.twitch.tv/dexdior447" target="_blank" class="watch-btn">
          Watch on Twitch ↗
        </a>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-section">
      <div class="chat-label">Live Chat</div>
      <div id="twitch-chat"></div>
      <div class="status-box">
        <div class="status-indicator" id="status-indicator"></div>
        <span id="status-text">Connecting to stream…</span>
      </div>
    </div>

  </main>

  <footer>
    Powered by <a href="https://dev.twitch.tv/docs/embed/" target="_blank">Twitch Embed API</a>
    &nbsp;·&nbsp; Channel:
    <a href="https://www.twitch.tv/dexdior447" target="_blank">dexdior447</a>
  </footer>

  <script>
    // ─────────────────────────────────────────
    // CONFIG — change these as needed
    // ─────────────────────────────────────────
    const CHANNEL  = "dexdior447";

    // ⚠️ IMPORTANT: Replace "your-site.vercel.app" with your
    // actual Vercel domain (e.g. "atharrv.vercel.app").
    // If you also have a custom domain, add it to the array:
    // const PARENTS = ["your-site.vercel.app", "yourcustomdomain.com"];
    const PARENT   = "raw-test-to-go-live.vercel.app/";  // 👈 CHANGE THIS
    // ─────────────────────────────────────────

    /* ── PLAYER ── */
    const player = new Twitch.Embed("twitch-embed", {
      width:   "100%",
      height:  "100%",
      channel: CHANNEL,
      parent:  [PARENT],
      layout:  "video",        // video only; use "video-with-chat" if you want Twitch's built-in chat in the player
      autoplay: true,
      muted:   false,
      theme:   "dark",
    });

    player.addEventListener(Twitch.Embed.VIDEO_READY, () => {
      document.getElementById("loading-overlay").classList.add("hidden");
    });

    player.addEventListener(Twitch.Embed.VIDEO_PLAY, () => {
      document.getElementById("live-badge").classList.add("visible");
      const ind  = document.getElementById("status-indicator");
      const txt  = document.getElementById("status-text");
      ind.className = "status-indicator online";
      txt.textContent = `🟢 ${CHANNEL} is live — enjoy the stream!`;
    });

    /* ── CHAT (separate iframe) ── */
    const chatFrame = document.createElement("iframe");
    chatFrame.src = `https://embed.twitch.tv/embed/v1/?channel=${CHANNEL}&parent=${PARENT}&chat_only=true&darkpopout=true`;
    chatFrame.style.cssText = "width:100%;height:100%;border:none;";
    chatFrame.allowFullscreen = true;
    document.getElementById("twitch-chat").appendChild(chatFrame);

    /* ── Offline / error fallback ── */
    setTimeout(() => {
      const overlay = document.getElementById("loading-overlay");
      const ind     = document.getElementById("status-indicator");
      const txt     = document.getElementById("status-text");
      // if still loading after 8s, the channel is probably offline
      if (!overlay.classList.contains("hidden")) {
        overlay.classList.add("hidden");
        ind.className = "status-indicator offline";
        txt.textContent = `${CHANNEL} is currently offline.`;
      }
    }, 8000);
  </script>
</body>
</html>
